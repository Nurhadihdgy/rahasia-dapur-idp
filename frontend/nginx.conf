server {
    listen 80;
    server_name rahasiadapur.easyflow.my.id;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name rahasiadapur.easyflow.my.id;

    ssl_certificate /etc/letsencrypt/live/rahasiadapur.easyflow.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rahasiadapur.easyflow.my.id/privkey.pem;

    client_max_body_size 20M;

    location /api/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}